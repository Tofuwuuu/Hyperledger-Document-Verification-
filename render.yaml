services:
  # Backend API service
  - type: web
    name: alumni-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://dbRod:dekdek812@cluster0.hl5tp.mongodb.net/cvsu_alumni?retryWrites=true&w=majority
      - key: SECRET_KEY
        generateValue: true
      - key: NOTIFICATIONS_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: "10000"

  # Frontend static site
  - type: web
    name: alumni-frontend
    env: static
    buildCommand: cd frontend && npm run install-and-build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: alumni-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
          append: /api/v1
      - key: VITE_POLLING_INTERVAL
        value: "5000" 