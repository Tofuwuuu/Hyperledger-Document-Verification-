services:
  # Backend API service
  - type: web
    name: final-ecri
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false # Use the value from the Render dashboard environment variables
      - key: SECRET_KEY
        generateValue: true
      - key: NOTIFICATIONS_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: "https://alumni-frontend-4r7o.onrender.com,http://localhost:3000,http://localhost:5173"
      - key: PORT
        value: "10000"

  # Frontend static site
  - type: web
    name: alumni-frontend
    env: static
    buildCommand: cd frontend && npm run install-and-build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: final-ecri
          type: web
          envVarKey: RENDER_EXTERNAL_URL
          append: /api/v1
      - key: VITE_POLLING_INTERVAL
        value: "5000" 