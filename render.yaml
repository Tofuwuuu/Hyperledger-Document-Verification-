services:
  # Static site for frontend
  - type: web
    name: alumni-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        fromService:
          name: alumni-api
          type: web
          property: url
          append: /api/v1
      - key: VITE_POLLING_INTERVAL
        value: 5000

  # Backend API (simple web service)
  - type: web
    name: alumni-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: false
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: NOTIFICATIONS_ENABLED
        value: true
      - key: BLOCKCHAIN_ENABLED
        value: false
      - key: CORS_ORIGINS
        sync: false 