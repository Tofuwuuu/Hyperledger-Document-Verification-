version: '3'

services:
  mongodb:
    image: mongo:latest
    container_name: cvsu_alumni_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=cvsu_alumni
    restart: unless-stopped
    networks:
      - app-network

  mongo-express:
    image: mongo-express:latest
    container_name: cvsu_alumni_mongo_express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data: 