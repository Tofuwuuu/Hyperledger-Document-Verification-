<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        button {
            padding: 8px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>CORS Test for Alumni API</h1>
    <p>This page tests if the API has CORS properly configured.</p>
    
    <div>
        <button id="testOptions">Test OPTIONS Request</button>
        <button id="testGet">Test GET Request</button>
        <button id="testPost">Test POST Request</button>
    </div>
    
    <h2>Result:</h2>
    <pre id="result">Click a button to test...</pre>
    
    <script>
        const API_URL = 'http://localhost:8000/api/v1';
        const resultEl = document.getElementById('result');
        
        // Test OPTIONS request
        document.getElementById('testOptions').addEventListener('click', async () => {
            resultEl.textContent = 'Testing OPTIONS request...';
            
            try {
                const response = await fetch(`${API_URL}/alumni/`, {
                    method: 'OPTIONS',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                resultEl.textContent = `OPTIONS Status: ${response.status}\n\nHeaders:\n`;
                
                for (const [key, value] of response.headers.entries()) {
                    resultEl.textContent += `${key}: ${value}\n`;
                }
            } catch (error) {
                resultEl.textContent = `ERROR: ${error.message}`;
            }
        });
        
        // Test GET request
        document.getElementById('testGet').addEventListener('click', async () => {
            resultEl.textContent = 'Testing GET request...';
            
            try {
                const response = await fetch(`${API_URL}/alumni/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                resultEl.textContent = `GET Status: ${response.status}\n\nResponse:\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultEl.textContent = `ERROR: ${error.message}`;
            }
        });
        
        // Test POST request
        document.getElementById('testPost').addEventListener('click', async () => {
            resultEl.textContent = 'Testing POST request...';
            
            const testData = {
                user_id: '68236de4d8d6f1393876b83f',
                full_name: 'CORS Test User',
                student_id: '12345678',
                email: 'test@example.com',
                graduation_year: 2023
            };
            
            try {
                const response = await fetch(`${API_URL}/alumni/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer YOUR_TOKEN_HERE' // Replace with actual token
                    },
                    body: JSON.stringify(testData)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultEl.textContent = `POST Status: ${response.status}\n\nResponse:\n${JSON.stringify(data, null, 2)}`;
                } else {
                    const errorText = await response.text();
                    resultEl.textContent = `POST Error: ${response.status}\n\n${errorText}`;
                }
            } catch (error) {
                resultEl.textContent = `ERROR: ${error.message}`;
            }
        });
    </script>
</body>
</html>
